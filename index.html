<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>J-World</title>
  <link rel="stylesheet" href="jworld.css">
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="overlay">
    <h1>J-World</h1>
  </div>
</div>

<!-- MAIN CONTENT -->
<div id="tools" style="display:none;">

  <!-- NUMINFO -->
  <div class="tool-card">
    <h2>NumInfo</h2>
    <input type="text" id="phoneInput" placeholder="+254XXXXXXXXX">
    <button onclick="lookupNumber()">Scan</button>
    <div id="resultBox"></div>
  </div>

  <!-- WIFI RADAR -->
  <section class="section">
    <h2>WiFi System Setup</h2>
    <div id="wifi-radar" class="wifi-panel">
      Scanning WiFi...
    </div>
    <button onclick="refreshWiFi()" class="wifi-btn">Scan Now</button>
  </section>

  <!-- MINI TERMUX -->
  <section class="section">
    <h2>Mini-Termux</h2>
    <div class="console">
      <pre id="console-output">Welcome to Mini-Termux! Type a command below.</pre>
      <input id="console-input" placeholder="Type command">
    </div>

    <div class="cmd-buttons">
      <button onclick="runCmd('ls')">ls</button>
      <button onclick="runCmd('pwd')">pwd</button>
      <button onclick="runCmd('whoami')">whoami</button>
      <button onclick="runCmd('date')">date</button>
      <button onclick="runCmd('clear')">clear</button>
    </div>
  </section>

  <!-- JUICE MESSAGES -->
  <section class="section juice-section">
    <h2>Juice Messages</h2>
    <ul id="quote-list"></ul>
    <button id="play-music">Play Song</button>
  </section>

  <!-- MORE INFO -->
  <section class="section">
    <h2>More Info</h2>
    <div class="card">
      <a href="https://www.instagram.com/channel/AbaF0KolrxmpCaCT/?igsh=a3Fpa2lobmlnODFo" target="_blank">Instagram</a>
      <a href="https://chat.whatsapp.com/GpcxVdDBfuCFQ4CYIBDelm?mode=gi_t" target="_blank">WhatsApp Group</a>
      <a href="tel:+254704813812">Call Me</a>
    </div>
  </section>

</div>

<script src="jworld.js"></script>
</body>
</html>

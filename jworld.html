<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J-World Ultimate OS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Top Status Bar -->
<div id="status-bar">
  <span id="sys-time">⏰ --:--:--</span>
  <span id="active-tools">🛠️ Active Tools: 0</span>
  <span id="wifi-count">📡 WiFi Networks: 0</span>
  <span id="update-status" class="heartbeat">⚡ Idle</span>
</div>

<canvas id="bg-canvas"></canvas>

<!-- Loader -->
<div id="loader">
  <h1>⚡ Booting J-World OS...</h1>
  <p>Loading tools...</p>
</div>

<div id="tools" style="display:none;">

  <!-- NumInfo Tool -->
  <div class="tool-card" id="numinfo-tool">
    <div class="tool-header" onclick="togglePanel('numinfo-panel')">
      <h2>📱 NumInfo</h2>
      <span class="status-dot" id="numinfo-status"></span>
    </div>
    <div id="numinfo-panel" class="tool-body">
      <p class="tool-desc">Enter a number to get intelligence: country, carrier, line type, location.</p>
      <input type="text" id="phoneInput" placeholder="+2547XXXXXXXX">
      <button onclick="lookupNumber()">Scan Number</button>
      <div id="resultBox" class="result-box"></div>
      <div id="numinfo-history" class="history-box"></div>
    </div>
  </div>

  <!-- WiFi Radar Tool -->
  <div class="tool-card" id="wifi-tool">
    <div class="tool-header" onclick="togglePanel('wifi-panel-body')">
      <h2>📡 WiFi Radar</h2>
      <span class="status-dot" id="wifi-status"></span>
    </div>
    <div id="wifi-panel-body" class="tool-body">
      <p class="tool-desc">Available networks sorted by signal strength. 🔒 = secured, ⚠️ = open.</p>
      <button onclick="refreshWiFi()">Refresh Now</button>
      <div id="wifi-radar" class="wifi-panel"></div>
      <div id="wifi-history" class="history-box"></div>
    </div>
  </div>

</div>

<script src="jworld.js"></script>
</body>
</html>
